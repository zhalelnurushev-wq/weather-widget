name: Build MedReminder APK

on:
  push:
    branches: [ main ]
    paths: [ 'medreminder/**', '.github/workflows/build-med.yml' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: medreminder
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/med-reminder-v1.1.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: med-reminder-apk
          path: medreminder/app/build/outputs/apk/debug/med-reminder-v1.1.apk

      - name: Publish release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: med-v1.1
          name: "Мои лекарства v1.1"
          files: medreminder/app/build/outputs/apk/debug/med-reminder-v1.1.apk
